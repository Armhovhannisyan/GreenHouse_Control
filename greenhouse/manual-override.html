<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreenCtrl — Manual Override</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <header id="app-header"></header>

  <div class="layout">
    <aside id="app-sidebar"></aside>

    <main id="app-main" class="manual-override-main">
      <div class="page-header">manual override</div>
      <div class="status-bar" id="moStatusBar"></div>
      <div class="actions-bar" id="moActionsBar"></div>
      <div class="last-updated">Last refreshed: <span id="moLastUpdated">—</span></div>

      <div class="manual-override-page-head">
        <p class="manual-override-hint text-muted" id="moPageSummary">Loading Sonoff devices…</p>
      </div>
      <div class="manual-override-list" id="moRelayList" aria-live="polite"></div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/logger.js"></script>
  <script src="js/components/header.js"></script>
  <script src="js/components/sidebar.js"></script>
  <script src="js/api/sonoff.js"></script>
  <script src="js/pages/manual-override.js"></script>
</body>
</html>
